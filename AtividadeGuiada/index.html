<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Minha Primeira Página</title>
  <style>
    /* Estilos simples para melhorar o formulário */
    form {
      max-width: 400px;
      margin: 20px auto;
      padding: 15px;
      border: 1px solid #ccc;
      border-radius: 8px;
      background-color: #f9f9f9;
    }

    fieldset {
      border: none;
      margin-bottom: 15px;
    }

    legend {
      font-weight: bold;
      margin-bottom: 10px;
    }

    label {
      display: block;
      margin-top: 10px;
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin-top: 5px;
      border: 1px solid #ccc;
      border-radius: 4px;
    }

    button {
      margin-top: 10px;
      padding: 10px 15px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }

    button[type="submit"] {
      background-color: #4CAF50;
      color: white;
    }

    button[type="reset"] {
      background-color: #f44336;
      color: white;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <h1>Minha primeira página HTML</h1>
  <p>Esta é minha primeira página criada na aula de desenvolvimento web.</p>

  <!-- Formulário de Cadastro -->
  <h2>Cadastro de Usuário</h2>
  <form action="/cadastro" method="POST">
    <fieldset>
      <legend>Dados Pessoais</legend>

      <label for="nome">Nome Completo:</label>
      <input type="text" id="nome" name="nome" required minlength="3" maxlength="100">

      <label for="email">Email:</label>
      <input type="email" id="email" name="email" required placeholder="seu@email.com">

      <label for="telefone">Telefone:</label>
      <input type="tel" id="telefone" name="telefone"
             pattern="\([0-9]{2}\) [0-9]{5}-[0-9]{4}"
             placeholder="(11) 99999-9999">

      <label for="nascimento">Data de Nascimento:</label>
      <input type="date" id="nascimento" name="nascimento" required>
    </fieldset>

    <fieldset>
      <legend>Preferências</legend>

      <label>
        <input type="checkbox" name="newsletter">
        Desejo receber newsletter
      </label>

      <label for="cidade">Cidade:</label>
      <select id="cidade" name="cidade" required>
        <option value="">Selecione...</option>
        <option value="sp">São Paulo</option>
        <option value="rj">Rio de Janeiro</option>
        <option value="bh">Belo Horizonte</option>
      </select>
    </fieldset>

    <button type="submit">Cadastrar</button>
    <button type="reset">Limpar</button>
  </form>
</body>
</html>
