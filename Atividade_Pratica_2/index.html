<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro de Usuário</title>
</head>
<body>
  <h1>Cadastro de Usuário</h1>

  <form action="#" method="POST">
    <!-- Nome -->
    <label for="nome">Nome completo:</label>
    <input type="text" id="nome" name="nome" required minlength="3">
    <br><br>

    <!-- Email -->
    <label for="email">Email:</label>
    <input type="email" id="email" name="email" required>
    <br><br>

    <!-- Telefone -->
    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telefone" placeholder="(11) 99999-9999">
    <br><br>

    <!-- Data de nascimento -->
    <label for="nascimento">Data de nascimento:</label>
    <input type="date" id="nascimento" name="nascimento" required>
    <br><br>

    <!-- Curso -->
    <label for="curso">Curso:</label>
    <select id="curso" name="curso" required>
      <option value="">Selecione</option>
      <option value="computacao">Computação</option>
      <option value="engenharia">Engenharia</option>
      <option value="design">Design</option>
    </select>
    <br><br>

    <!-- Mensagem -->
    <label for="mensagem">Mensagem:</label>
    <textarea id="mensagem" name="mensagem" rows="4" cols="40"></textarea>
    <br><br>

    <!-- Newsletter -->
    <label>
      <input type="checkbox" name="newsletter">
      Desejo receber novidades
    </label>
    <br><br>

    <!-- Desafio 1: Senha -->
    <label for="senha">Senha:</label>
    <input type="password" id="senha" name="senha" minlength="8" aria-describedby="dicaSenha" required>
    <small id="dicaSenha">Mínimo 8 caracteres</small>
    <br><br>

    <!-- Desafio 2: Idade -->
    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade" min="18" max="120" required>
    <br><br>

    <!-- Botões -->
    <button type="submit">Enviar</button>
    <button type="reset">Limpar</button>
  </form>
</body>
</html>
